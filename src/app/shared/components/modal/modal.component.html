<div class="modal-backdrop" *ngIf="visible">

  <div class="modal-card">

    <!-- ICON -->

    <div class="modal-icon" [ngClass]="config.type">

      <mat-icon *ngIf="config.type==='success'">check_circle</mat-icon>

      <mat-icon *ngIf="config.type==='error'">cancel</mat-icon>

      <mat-icon *ngIf="config.type==='warning'">warning</mat-icon>

      <mat-icon *ngIf="config.type==='info'">info</mat-icon>

      <mat-icon *ngIf="config.type==='confirm'">help</mat-icon>

      <mat-icon *ngIf="config.type==='delete'">delete</mat-icon>

    </div>

    <!-- TITLE -->

    <h3>{{config.title || 'Mensaje'}}</h3>

    <!-- MESSAGE -->

    <p *ngIf="config.message">

      {{config.message}}

    </p>

    <!-- LOADER -->

    <div class="modal-loader" *ngIf="loading">

      <div class="spinner"></div>

    </div>

    <!-- ACTIONS -->

    <div class="modal-actions">

      <button
        *ngIf="config.type==='confirm' || config.type==='delete'"
        class="btn-cancel"
        (click)="cancel()"
      >
        {{config.cancelText || 'Cancelar'}}
      </button>

      <button
        class="btn-confirm"
        [ngClass]="config.type"
        (click)="confirm()"
      >
        {{config.confirmText || 'Aceptar'}}
      </button>

    </div>

  </div>

</div>
