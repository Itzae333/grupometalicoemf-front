<div class="notification-create" [formGroup]="form">

  <!-- ANIMACION FONDO -->
  <div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- HEADER -->
    <div class="header">
      <h1>🔔 Crear evento de notificación</h1>
    </div>

    <!-- EVENTO -->
    <mat-card class="card">
      <h2>Datos del evento</h2>

      <div class="grid">

        <div class="input-container">
          <label>Event Key: </label>
          <input formControlName="eventKey"/>
        </div>

        <div class="input-container">
          <label>Descripción: </label>
          <input formControlName="description"/>
        </div>

      </div>
    </mat-card>

    <!-- TEMPLATES -->
    <mat-card class="card">

      <div class="template-header">
        <h2>Templates</h2>

        <button class="btn-primary" (click)="addTemplate()">
          ➕ Agregar template
        </button>
      </div>

      <div formArrayName="templates">

        <div
          *ngFor="let t of templates.controls; let i = index"
          class="template-card"
          [formGroupName]="i"
        >

          <!-- HEADER TEMPLATE -->
          <div class="template-top">

            <h3>Template {{i + 1}}</h3>

            <button class="btn-danger"
                    (click)="removeTemplate(i)">
              🗑 Eliminar
            </button>

          </div>

          <div class="grid">

            <div class="input-container">
              <label>Canal</label>
              <select formControlName="channel">
                <option *ngFor="let c of channels" [value]="c">
                  {{c}}
                </option>
              </select>
            </div>

            <div class="input-container">
              <label>Subject</label>
              <input formControlName="subject"/>
            </div>

            <div class="input-container">
              <label>Sender Email</label>
              <input formControlName="senderEmail"/>
            </div>

          </div>

          <!-- HTML TEMPLATE -->
          <div class="html-editor">

            <label>HTML Template</label>

            <textarea
              formControlName="htmlContent"
              rows="10"
              placeholder="<h1>Hola </h1>"
              (input)="updatePreview(i)">
            </textarea>

          </div>

          <!-- PARAMETROS -->
          <div class="parameters">

            <div class="param-header">

              <h3>Parámetros dinámicos</h3>

              <button class="btn-secondary"
                      (click)="addParameter(i)">
                ➕ Agregar parámetro
              </button>

            </div>

            <div formArrayName="parameters">

              <div
                class="param-row"
                *ngFor="let p of getParameters(i).controls; let j = index"
                [formGroupName]="j"
              >

                <input placeholder="paramKey"
                       formControlName="paramKey"/>

                <select formControlName="type">
                  <option *ngFor="let t of paramTypes" [value]="t">
                    {{t}}
                  </option>
                </select>

                <label class="checkbox">
                  <input type="checkbox"
                         formControlName="required"/>
                  Required
                </label>

                <input placeholder="default value"
                       formControlName="defaultValue"/>

                <button
                  class="btn-danger small"
                  (click)="removeParameter(i,j)">
                  ✖
                </button>

              </div>

            </div>

          </div>

        </div>

      </div>

    </mat-card>

    <!-- PREVIEW -->
    <mat-card class="card preview">

      <h2>Vista previa HTML</h2>

      <div class="preview-box"
           [innerHTML]="previewHtml">
      </div>

    </mat-card>

    <button class="save-btn" (click)="save()">
      Guardar evento
    </button>

  </div>

</div>
