<div class="modal-overlay">

  <div class="modal">

    <div class="header">
      <h1>Pagos</h1>
      <button class="icon-small" (click)="close()">✖</button>
    </div>

    <div class="table">

      <table>
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Fecha</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let p of data">
            <td>{{ p.tipoPago }}</td>
            <td>${{ p.cantidad }}</td>
            <td>{{ p.fechaHora | date:'short' }}</td>
          </tr>
        </tbody>
      </table>

    </div>

  </div>

</div>
